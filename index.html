<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Card Games</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="nav">
    <div class="nav-left">
      <a class="brand" href="./index.html">Card Games</a>
    </div>
    <nav class="nav-right">
      <a class="active" href="./index.html">Games</a>
      <a href="https://raydendodd.github.io/">Main Site</a>
    </nav>
  </header>

  <main class="page">
    <section class="teaser">
      <div class="teaser-inner">
        <h1>Card Games</h1>
        <p class="muted">A growing collection of card games with dealer and player views, ready for phone and desktop.</p>
      </div>
    </section>

    <div class="tab-controls" id="tabs"></div>
    <div id="grid" class="card-grid"></div>
  </main>

  <footer class="footer">
    <span>© <span id="year"></span> Rayden Dodd</span>
  </footer>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();

    const games = [
      {
        id: "f-the-dealer",
        title: "F*** The Dealer",
        desc: "Dealer mode draws privately while player mode reveals the board state and seen card counts.",
        tags: ["JavaScript", "Card Game", "Mobile"],
        play: "./FTheDealer.html",
        category: "Card Games"
      }
    ];

    const tabsEl = document.getElementById("tabs");
    const grid = document.getElementById("grid");
    const categories = ["All", ...new Set(games.map(g => g.category || "Other"))];
    let activeCategory = "All";

    function renderTabs() {
      tabsEl.innerHTML = categories.map(cat => `
        <button type="button" class="${cat === activeCategory ? "active" : ""}" data-category="${cat}">${cat}</button>
      `).join("");

      tabsEl.querySelectorAll("button").forEach(button => {
        button.addEventListener("click", () => {
          activeCategory = button.dataset.category;
          renderTabs();
          renderGrid();
        });
      });
    }

    function renderGrid() {
      const filtered = activeCategory === "All"
        ? games
        : games.filter(g => (g.category || "Other") === activeCategory);

      grid.innerHTML = filtered.length
        ? filtered.map(game => `
            <a class="card" href="${game.play}">
              <h3>${game.title}</h3>
              <p class="muted">${game.desc}</p>
              <div class="tag-row">${(game.tags || []).map(tag => `<span class="tag">${tag}</span>`).join("")}</div>
              <div class="card-actions"><span class="btn small">Play</span></div>
            </a>
          `).join("")
        : `<div class="card" style="text-align:center;"><p class="muted">No games available yet.</p></div>`;
    }

    renderTabs();
    renderGrid();
  </script>
</body>
</html>
